services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
  backend:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    command: bash -lc "python -m pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../packages/backend:/app
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && npx next dev --webpack --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
    volumes:
      - ../packages/frontend:/app
      - ../packages/api-client/src:/api-client/src:ro
      - ../tsconfig.base.json:/tsconfig.base.json:ro
    env_file:
      - ../.env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8002}:3000"

volumes:
  postgres_data:
